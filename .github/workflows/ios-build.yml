name: Build iOS IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup EAS
        run: npm install -g eas-cli

      - name: Fix and Install Dependencies
        run: |
          rm -f package-lock.json
          npm install --legacy-peer-deps

      - name: Build Local IPA
        # --skip-credentials ekleyerek Apple hesabı sormasını engelliyoruz
        # Platformu ve cihaz mimarisini koruyarak sadece derleme yapıyoruz
        run: npx eas-cli build --platform ios --local --profile preview --non-interactive --output="./kurye_test.ipa" --skip-credentials
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          NPM_CONFIG_LEGACY_PEER_DEPS: true

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kurye-iOS-Gercek-Cihaz
          path: kurye_test.ipa
          retention-days: 1
