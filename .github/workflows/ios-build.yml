name: Build iOS IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup EAS
        run: npm install -g eas-cli

      - name: Fix and Install Dependencies
        run: |
          rm -f package-lock.json
          npm install --legacy-peer-deps

      - name: Build Local IPA
        # Çıktıyı zorla ana dizine 'inver_kurye.app' adıyla alıyoruz
        run: npx eas-cli build --platform ios --local --profile preview --non-interactive --output="./inver_kurye.app"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          NPM_CONFIG_LEGACY_PEER_DEPS: true

      - name: Convert to IPA
        # Manuel yaptığın Payload/Zip işlemini burada otomatik yapıyoruz
        run: |
          mkdir -p Payload
          cp -R ./inver_kurye.app Payload/
          zip -r kurye_test.ipa Payload/

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kurye-iOS-Yukleme-Dosyasi
          path: kurye_test.ipa
          retention-days: 1
