name: Build iOS IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup EAS
        run: npm install -g eas-cli

      - name: Install dependencies
        # 'npm ci' yerine 'npm install' kullanarak lock dosyası hatasını aşıyoruz
        run: npm install --legacy-peer-deps

      - name: Build Local IPA
        # Sertifika hatasını 'simulator: true' (eas.json'da) ile aşmıştık
        run: npx eas-cli build --platform ios --local --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-app-ipa
          path: build/*.app
