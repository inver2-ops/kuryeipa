name: Build iOS IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup EAS
        run: npm install -g eas-cli

      - name: Fix and Install
        run: |
          rm -f package-lock.json
          npm install --legacy-peer-deps

      - name: Build Local IPA
        # Burası ana uygulama için 'preview' profilini kullanır
        run: npx eas-cli build --platform ios --local --profile preview --non-interactive --output="./INVERWater.app"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          NPM_CONFIG_LEGACY_PEER_DEPS: true

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -R ./INVERWater.app Payload/
          zip -r INVERWater.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: INVERWater-iOS-Paketi
          path: INVERWater.ipa
