name: Build iOS IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Sürümü 20 yaptık
          cache: 'npm'

      - name: Setup EAS
        run: npm install -g eas-cli

      - name: Install dependencies
        run: npm install

      - name: Build Local IPA
        run: npx eas-cli build --platform ios --local --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }} # Gizli anahtarını burada kullandık

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-app-ipa
          path: build/*.ipa
